<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#4F46E5">
  <title>Student Projects Hub - Admin</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/forms.css">
</head>
<body>
  <header class="navbar">
    <div class="container navbar-inner">
      <a href="index.html" class="logo-link">
        <img src="assets/logo.svg" alt="Student Projects Hub" class="logo">
      </a>
      <nav class="nav-center">
        <a href="index.html" class="nav-link" data-i18n="nav.home"></a>
      </nav>
      <div class="nav-actions">
        <div class="lang-switcher">
          <button class="lang-btn" data-lang="ar">AR</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="tr">TR</button>
        </div>
        <div id="auth-area">
          <div class="user-menu" id="user-menu">
            <img src="" alt="" class="avatar" id="user-avatar">
            <span class="username" id="user-name"></span>
            <span class="badge-admin" data-i18n="admin.badge"></span>
            <button class="btn btn-ghost" id="btn-logout" data-i18n="nav.logout"></button>
          </div>
        </div>
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <main class="main-content">
    <div class="container">
      <a href="index.html" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 5l-7 7 7 7"/>
        </svg>
        <span data-i18n="common.back"></span>
      </a>

      <div class="admin-header">
        <h1 data-i18n="admin.title"></h1>
        <div class="admin-stats" id="admin-stats">
          <div class="stat-card">
            <span class="stat-value" id="stat-users">-</span>
            <span class="stat-label" data-i18n="admin.total_users"></span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-projects">-</span>
            <span class="stat-label" data-i18n="admin.total_projects"></span>
          </div>
        </div>
      </div>

      <div class="admin-tabs">
        <button class="tab-btn active" id="tab-projects" data-i18n="admin.tab_projects"></button>
        <button class="tab-btn" id="tab-users" data-i18n="admin.tab_users"></button>
      </div>

      <div class="tab-panel" id="panel-projects">
        <div class="panel-toolbar">
          <input type="search" class="form-input search-input" id="search-projects" data-i18n-placeholder="admin.search_projects">
        </div>
        <div class="alert alert-error hidden" id="projects-error"></div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="projects-table">
            <thead>
              <tr>
                <th data-i18n="admin.col_title"></th>
                <th data-i18n="admin.col_author"></th>
                <th data-i18n="admin.col_likes"></th>
                <th data-i18n="admin.col_date"></th>
                <th data-i18n="admin.col_actions"></th>
              </tr>
            </thead>
            <tbody id="projects-tbody">
              <tr class="skeleton-row"><td colspan="5"></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="tab-panel hidden" id="panel-users">
        <div class="panel-toolbar">
          <input type="search" class="form-input search-input" id="search-users" data-i18n-placeholder="admin.search_users">
        </div>
        <div class="alert alert-error hidden" id="users-error"></div>
        <div class="admin-table-wrap">
          <table class="admin-table" id="users-table">
            <thead>
              <tr>
                <th data-i18n="admin.col_user"></th>
                <th data-i18n="admin.col_email"></th>
                <th data-i18n="admin.col_status"></th>
                <th data-i18n="admin.col_joined"></th>
                <th data-i18n="admin.col_actions"></th>
              </tr>
            </thead>
            <tbody id="users-tbody">
              <tr class="skeleton-row"><td colspan="5"></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <a href="index.html" class="logo-link">
        <img src="assets/logo.svg" alt="Student Projects Hub" class="logo logo-sm">
      </a>
      <p class="footer-copy" data-i18n="footer.copy"></p>
    </div>
  </footer>

  <div class="modal-overlay hidden" id="confirm-overlay">
    <div class="modal modal-sm">
      <h3 id="confirm-title"></h3>
      <p id="confirm-msg"></p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="btn-cancel-confirm" data-i18n="common.cancel"></button>
        <button class="btn btn-danger" id="btn-confirm-action" data-i18n="common.confirm"></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/supabase.js"></script>
  <script type="module" src="js/i18n.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
